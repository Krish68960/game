<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MAZE ARENA - AUTOPILOT</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; background: #080a0f; color: #ffffff; overflow: hidden;
            font-family: 'Rajdhani', sans-serif; user-select: none; -webkit-user-select: none;
        }
        canvas { display: block; background: #0c0f17; }
        
        #hud {
            position: absolute; top: 15px; left: 15px; background: rgba(12, 15, 23, 0.85);
            border-left: 4px solid #00d2ff; padding: 12px 20px; border-radius: 0 10px 10px 0;
            pointer-events: none; z-index: 10; backdrop-filter: blur(5px);
        }
        #playerName { font-family: 'Orbitron', sans-serif; font-size: 16px; color: #fff; margin-bottom: 4px; }
        #playerHealth { font-size: 18px; color: #ff0055; margin-bottom: 4px; letter-spacing: 2px;}
        .alive-count { font-size: 13px; color: #00d2ff; letter-spacing: 1px; }
        
        #autopilot-badge {
            font-family: 'Orbitron', sans-serif; font-size: 12px; color: #2ed573;
            margin-top: 5px; border: 1px solid #2ed573; padding: 2px 6px; border-radius: 4px;
            display: inline-block; animation: blink 2s infinite;
        }

        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.4;} 100% {opacity: 1;} }

        #death-screen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 8, 0.9); z-index: 100; flex-direction: column;
            justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        #death-screen h1 { font-family: 'Orbitron', sans-serif; font-size: 3.5rem; color: #ff0055; margin: 0; }
        #death-screen p { font-size: 1.2rem; color: #8892b0; margin-top: 5px; cursor: pointer;}
    </style>
</head>
<body>

<div id="hud">
    <div id="playerName">LOADING DATA...</div>
    <div id="playerHealth">HP: 5 / 5</div>
    <div class="alive-count" id="aliveCounter">SURVIVORS: 0</div>
    <div id="autopilot-badge">AUTOPILOT ENGAGED</div>
</div>

<div id="death-screen">
    <h1>ELIMINATED</h1>
    <p onclick="window.location.reload()">Tap here to spectate a new unit</p>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const socket = io();
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const deathScreen = document.getElementById('death-screen');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let myId = null, maze = [], cellSize = 100;
    let gameState = { players: {}, bullets: [] };
    let mazePathCache = null;

    socket.on('init', (data) => { 
        maze = data.maze; cellSize = data.cellSize; myId = data.id; 
        precacheMaze(); 
    });
    socket.on('gameState', (state) => { gameState = state; });

    function precacheMaze() {
        mazePathCache = new Path2D();
        for (let r = 0; r < maze.length; r++) {
            for (let c = 0; c < maze[r].length; c++) {
                let x = c * cellSize, y = r * cellSize;
                let cell = maze[r][c];
                if (cell.n) { mazePathCache.moveTo(x, y); mazePathCache.lineTo(x + cellSize, y); }
                if (cell.s) { mazePathCache.moveTo(x, y + cellSize); mazePathCache.lineTo(x + cellSize, y + cellSize); }
                if (cell.e) { mazePathCache.moveTo(x + cellSize, y); mazePathCache.lineTo(x + cellSize, y + cellSize); }
                if (cell.w) { mazePathCache.moveTo(x, y); mazePathCache.lineTo(x, y + cellSize); }
            }
        }
    }

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let me = gameState.players[myId];
        
        if (!me) {
            deathScreen.style.display = 'flex';
            requestAnimationFrame(gameLoop);
            return;
        } else {
            deathScreen.style.display = 'none';
        }

        document.getElementById('playerName').innerText = "AGENT: " + me.name;
        document.getElementById('playerHealth').innerText = "HP: " + me.health + " / 5";
        document.getElementById('aliveCounter').innerText = `ACTIVE SURVIVORS: ${Object.keys(gameState.players).length}`;

        // Camera tracks the auto-moving player
        let camX = Math.floor(canvas.width / 2 - me.x);
        let camY = Math.floor(canvas.height / 2 - me.y);
        ctx.save();
        ctx.translate(camX, camY);

        ctx.strokeStyle = "#00d2ff"; 
        ctx.lineWidth = 4;
        if (mazePathCache) ctx.stroke(mazePathCache);

        ctx.fillStyle = "#ffd32a";
        for (let b of gameState.bullets) {
            ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI * 2); ctx.fill();
        }

        for (let id in gameState.players) {
            let p = gameState.players[id];
            
            ctx.fillStyle = "#ffffff";
            ctx.beginPath(); ctx.arc(p.x, p.y, 14, 0, Math.PI * 2); ctx.fill();
            
            ctx.strokeStyle = "#00d2ff";
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(p.x, p.y, 14, 0, Math.PI * 2); ctx.stroke();

            ctx.strokeStyle = "#00d2ff"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(p.x, p.y);
            ctx.lineTo(p.x + Math.cos(p.angle) * 18, p.y + Math.sin(p.angle) * 18);
            ctx.stroke();

            ctx.fillStyle = "#ffffff"; 
            ctx.font = "bold 13px 'Rajdhani', sans-serif"; 
            ctx.textAlign = "center";
            ctx.fillText(p.name, p.x, p.y - 22);
            
            ctx.fillStyle = "rgba(255,255,255,0.15)";
            ctx.fillRect(p.x - 18, p.y - 15, 36, 4);
            ctx.fillStyle = "#00d2ff";
            ctx.fillRect(p.x - 18, p.y - 15, (p.health / 5) * 36, 4);
        }

        ctx.restore();
        requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);

    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; if(maze.length) precacheMaze(); });
</script>
</body>
</html>
