<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON MAZE ROYALE</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #05070a; color: #fff; overflow: hidden; font-family: 'Rajdhani', sans-serif; user-select: none; }
        canvas { display: block; }
        #hud {
            position: absolute; top: 15px; left: 15px; background: rgba(5, 7, 10, 0.9);
            border-left: 4px solid #00ffaa; padding: 12px 20px; border-radius: 0 10px 10px 0;
            pointer-events: none; z-index: 10; backdrop-filter: blur(8px); box-shadow: 0 0 15px rgba(0,255,170,0.1);
        }
        #playerName { font-family: 'Orbitron', sans-serif; font-size: 15px; letter-spacing: 1px; }
        #playerHealth { font-size: 18px; color: #ff0055; margin: 4px 0; font-weight: bold; }
        .alive-count { font-size: 13px; color: #00d2ff; }

        #controls-container {
            position: absolute; bottom: 30px; left: 0; width: 100%;
            display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; z-index: 20;
        }
        .dpad { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); gap: 8px; }
        .control-btn {
            background: rgba(0, 210, 255, 0.05); border: 2px solid rgba(0, 210, 255, 0.3);
            border-radius: 14px; color: #00d2ff; font-size: 20px; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
        }
        .control-btn:active { background: rgba(0, 210, 255, 0.3); color: #fff; }
        #btn-up { grid-column: 2; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }

        #btn-shoot {
            width: 90px; height: 90px; border-radius: 50%; background: #ff0055;
            border: 2px solid #fff; color: white; font-family: 'Orbitron', sans-serif;
            font-size: 16px; font-weight: 700; box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
        }
        #death-screen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 4, 6, 0.95); z-index: 100; flex-direction: column;
            justify-content: center; align-items: center; backdrop-filter: blur(8px);
        }
        #death-screen h1 { font-family: 'Orbitron', sans-serif; font-size: 3.5rem; color: #ff0055; }
        #death-screen p { font-size: 1.2rem; color: #00d2ff; cursor: pointer; text-decoration: underline;}
    </style>
</head>
<body>

<div id="hud">
    <div id="playerName">INITIALIZING...</div>
    <div id="playerHealth">HP: 5 / 5</div>
    <div class="alive-count" id="aliveCounter">SURVIVORS: 0</div>
</div>

<div id="death-screen">
    <h1>ELIMINATED</h1>
    <p onclick="window.location.reload()">RESPAWN CLONE MATRIX</p>
</div>

<canvas id="gameCanvas"></canvas>

<div id="controls-container">
    <div class="dpad">
        <button class="control-btn" id="btn-up">▲</button>
        <button class="control-btn" id="btn-left">◀</button>
        <button class="control-btn" id="btn-down">▼</button>
        <button class="control-btn" id="btn-right">▶</button>
    </div>
    <button class="control-btn" id="btn-shoot">FIRE</button>
</div>

<script>
    const socket = io(window.location.origin, { transports: ['websocket', 'polling'] });
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const deathScreen = document.getElementById('death-screen');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let myId = null, maze = [], cellSize = 100;
    let serverState = { players: {}, bullets: [] };
    let localPlayers = {}; // Client-side interpolation memory cache
    let mazeCache = null;

    let touchMove = { up: false, down: false, left: false, right: false };
    let keys = {};
    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    setupTouchButton('btn-up', 'up'); setupTouchButton('btn-down', 'down');
    setupTouchButton('btn-left', 'left'); setupTouchButton('btn-right', 'right');
    
    document.getElementById('btn-shoot').addEventListener('touchstart', (e) => { e.preventDefault(); socket.emit('shoot'); });
    document.getElementById('btn-shoot').addEventListener('mousedown', (e) => { e.preventDefault(); socket.emit('shoot'); });

    function setupTouchButton(id, direction) {
        const btn = document.getElementById(id);
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); touchMove[direction] = true; });
        btn.addEventListener('touchend', (e) => { e.preventDefault(); touchMove[direction] = false; });
        btn.addEventListener('mousedown', (e) => { e.preventDefault(); touchMove[direction] = true; });
        btn.addEventListener('mouseup', (e) => { e.preventDefault(); touchMove[direction] = false; });
    }

    socket.on('init', (data) => { 
        maze = data.maze; cellSize = data.cellSize; myId = data.id; 
        precacheMaze(); 
    });
    
    socket.on('gameState', (state) => { serverState = state; });

    function precacheMaze() {
        mazeCache = new Path2D();
        for (let r = 0; r < maze.length; r++) {
            for (let c = 0; c < maze[r].length; c++) {
                let x = c * cellSize, y = r * cellSize;
                let cell = maze[r][c];
                if (cell.n) { mazeCache.moveTo(x, y); mazeCache.lineTo(x + cellSize, y); }
                if (cell.s) { mazeCache.moveTo(x, y + cellSize); mazeCache.lineTo(x + cellSize, y + cellSize); }
                if (cell.e) { mazeCache.moveTo(x + cellSize, y); mazeCache.lineTo(x + cellSize, y + cellSize); }
                if (cell.w) { mazeCache.moveTo(x, y); mazeCache.lineTo(x, y + cellSize); }
            }
        }
    }

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let me = serverState.players[myId];
        if (!me) {
            deathScreen.style.display = 'flex';
            requestAnimationFrame(gameLoop);
            return;
        } else {
            deathScreen.style.display = 'none';
        }

        document.getElementById('playerName').innerText = "OPERATIVE: " + me.name;
        document.getElementById('playerHealth').innerText = "INTEGRITY: " + "🩸".repeat(me.health);
        document.getElementById('aliveCounter').innerText = `COMBATANTS ACTIVE: ${Object.keys(serverState.players).length}`;

        // Send Manual Inputs
        let dx = 0, dy = 0;
        if (keys['w'] || keys['arrowup'] || touchMove.up) dy = -1;
        if (keys['s'] || keys['arrowdown'] || touchMove.down) dy = 1;
        if (keys['a'] || keys['arrowleft'] || touchMove.left) dx = -1;
        if (keys['d'] || keys['arrowright'] || touchMove.right) dx = 1;

        if (dx !== 0 || dy !== 0) {
            socket.emit('move', { angle: Math.atan2(dy, dx), speed: 4.5 });
        }

        // Camera Lock Tracking
        if (!localPlayers[myId]) localPlayers[myId] = { x: me.x, y: me.y, angle: me.angle };
        // Smooth Lerp Camera Follow
        localPlayers[myId].x += (me.x - localPlayers[myId].x) * 0.35;
        localPlayers[myId].y += (me.y - localPlayers[myId].y) * 0.35;

        let camX = Math.floor(canvas.width / 2 - localPlayers[myId].x);
        let camY = Math.floor(canvas.height / 2 - localPlayers[myId].y);
        ctx.save();
        ctx.translate(camX, camY);

        // Render Cyber Grid Field Background
        ctx.strokeStyle = "rgba(0, 210, 255, 0.02)"; ctx.lineWidth = 1;
        for (let i = 0; i < 1500; i += 50) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 1500); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(1500, i); ctx.stroke();
        }

        // Render Vivid Neon Maze Walls
        ctx.strokeStyle = "#00d2ff"; ctx.lineWidth = 4;
        if (mazeCache) ctx.stroke(mazeCache);

        // Projectiles Tracer Lines
        ctx.fillStyle = "#ffd32a";
        for (let b of serverState.bullets) {
            ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI * 2); ctx.fill();
        }

        // Client Side Linear Interpolation Processing for Entities (Fixes Wall Trapping Judder completely)
        for (let id in serverState.players) {
            let sPlayer = serverState.players[id];
            
            if (!localPlayers[id]) {
                localPlayers[id] = { x: sPlayer.x, y: sPlayer.y, angle: sPlayer.angle };
            } else {
                // Client-side smoothing equation
                localPlayers[id].x += (sPlayer.x - localPlayers[id].x) * 0.3;
                localPlayers[id].y += (sPlayer.y - localPlayers[id].y) * 0.3;
                localPlayers[id].angle = sPlayer.angle;
            }

            let lp = localPlayers[id];
            let identityColor = (id === myId) ? "#00ffaa" : (sPlayer.isHard ? "#ff0055" : "#00d2ff");

            // Character Node Graphic
            ctx.fillStyle = "#ffffff";
            ctx.beginPath(); ctx.arc(lp.x, lp.y, 13, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = identityColor; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(lp.x, lp.y, 13, 0, Math.PI * 2); ctx.stroke();

            // Vector Aim pointer
            ctx.strokeStyle = identityColor; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(lp.x, lp.y);
            ctx.lineTo(lp.x + Math.cos(lp.angle) * 18, lp.y + Math.sin(lp.angle) * 18);
            ctx.stroke();

            // Render text meta information
            ctx.fillStyle = "#ffffff"; ctx.font = "bold 13px 'Rajdhani', sans-serif"; ctx.textAlign = "center";
            ctx.fillText(sPlayer.name, lp.x, lp.y - 22);

            // Floating dynamic health tracker bars
            ctx.fillStyle = "rgba(255,255,255,0.1)"; ctx.fillRect(lp.x - 18, lp.y - 15, 36, 4);
            ctx.fillStyle = identityColor; ctx.fillRect(lp.x - 18, lp.y - 15, (sPlayer.health / 5) * 36, 4);
        }

        // Clean memory container states for disconnected players
        for (let id in localPlayers) {
            if (!serverState.players[id]) delete localPlayers[id];
        }

        ctx.restore();
        requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);

    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; if(maze.length) precacheMaze(); });
</script>
</body>
</html>
